<section class="app-wrapper">
  <div class="todo-container">
    <h2 class="title">To-Do App</h2>

    <form [formGroup]="formValue" class="todo-form">
      <input
        type="text"
        #newTask
        formControlName="newTask"
        placeholder="Enter new task..."
        class="task-input"
      />

      <button type="submit" id="save-btn" (click)="addTask(newTask.value)">
        Add Task
      </button>
    </form>

    <table class="todo-table">
      <thead>
        <tr>
          <th>No.</th>
          <th>Todo Item</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let todoItem of getData; let i = index">
          <td>{{ i + 1 }}</td>

          <td
            class="task-text"
            [class.completed]="todoItem.completed"
          >
            {{ todoItem.task }}
          </td>

          <td>
            {{ todoItem.completed ? 'Done' : 'Pending' }}
          </td>

          <td class="actions">
            <button class="delete-btn" (click)="deleteTask(todoItem.id)">
              Delete
            </button>

            <button
              class="finish-btn"
              (click)="toggleTask(todoItem.id, getData)"
            >
              Finished
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
